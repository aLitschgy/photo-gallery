name: Docker Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: dockerhub
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=${TAG}" >> $GITHUB_OUTPUT
          # Extract major, minor, patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "major_minor=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate DockerHub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is missing for environment 'dockerhub'."
            echo "Ensure secrets are defined in repository secrets, or in the 'dockerhub' environment secrets."
            exit 1
          fi
      
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            alitschgy/photogallery:${{ steps.version.outputs.version }}
            alitschgy/photogallery:${{ steps.version.outputs.major_minor }}
            alitschgy/photogallery:${{ steps.version.outputs.major }}
            alitschgy/photogallery:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
