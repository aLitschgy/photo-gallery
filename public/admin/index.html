<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Admin - Galerie Photo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/css/admin.css" />
  </head>

  <body>
    <div class="container">
      <header class="header">
        <h1>📸 Administration de la Galerie</h1>
        <button class="logout-btn" onclick="logout()">
          <span>🚪</span> Déconnexion
        </button>
      </header>

      <section class="upload-section">
        <h2>Ajouter des photos</h2>
        <form id="upload-form" class="upload-form">
          <div class="file-input-wrapper">
            <input
              type="file"
              name="photo"
              id="photo"
              accept="image/*"
              multiple
              class="file-input"
            />
            <label for="photo" class="file-label">
              <span class="file-icon">📁</span>
              <span class="file-text">Choisir des images</span>
            </label>
          </div>
          <button type="submit" class="submit-btn">
            <span>⬆️</span> Envoyer
          </button>
        </form>
        <div id="upload-error" class="message error-message"></div>
        <div id="upload-success" class="message success-message"></div>
      </section>

      <section class="gallery-section">
        <h2>Gestion de la galerie</h2>
        <p class="hint">
          💡 Glissez-déposez les photos pour réorganiser l'ordre
        </p>
        <div id="gallery-management" class="gallery-grid">
          <!-- Les photos seront chargées ici -->
        </div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="/assets/js/verify-token.js"></script>
    <script src="/assets/js/admin.js"></script>
  </body>
</html>
